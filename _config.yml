# Hexo 配置
title: "xf_blog"
subtitle: ""
description: "hexo blog"
keywords:
author: xiaofen
language: zh-CN
timezone: Asia/Shanghai

# 网址
url: https://xfcnl.github.io
permalink: :category/:year-:month-:day-:title/
permalink_defaults:
  category: tech
pretty_urls:
  trailing_index: false
  trailing_html: false

# 目录
source_dir: source
public_dir: public
tag_dir: tag
archive_dir: archive
category_dir: ""
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 写作
new_post_name: :year-:month-:day-:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: false
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: false
  tab_replace: ""

# 首页设置
index_generator:
  path: ""
  per_page: 0
  order_by: -date

# 分类与标签
default_category: tech
category_map:
  tech: tech
  note: note
tag_map:

# 元数据元素
meta_generator: true

# 日期/时间格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: "mtime"

# 分页
per_page: 0
pagination_dir: page

# 包含/排除文件
include:
exclude:
ignore:

# 扩展
theme: xf

# 部署（由 GitHub Actions 处理，见 .github/workflows/deploy.yml）

# 统计
umami_url: https://u.mikufans1.dpdns.org/script.js
umami_website_id: "f2148f54-d080-4031-a8c9-e2a65e202bda"

# 外部链接
sub_site_url: https://mikufans1.dpdns.org
vicp_url: https://mikufans.qzz.io
rsshub_url: https://gff.ccwu.cc
# 订阅
feed:
  type: atom
  path: feed.xml
  limit: 0

# 站点地图
sitemap:
  path: sitemap.xml

# 网易云音乐播放器
netease_player:
  enable: true
  playlist_id: "8285330087"
  fixed: true
  mini: true
  theme: "#e74c3e"
  volume: 0.5
  order: "list"

# 头像与网站图标
avatar: https://raw.gh.1s.fan/xfcnl/xfcnl.github.io/refs/heads/main/image/MEITU_20260128_220225596.jpg
favicon: https://raw.gh.1s.fan/xfcnl/xfcnl.github.io/refs/heads/main/image/MEITU_20260128_220225596.jpg
