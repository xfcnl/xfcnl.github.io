# Hexo Configuration
title: "xf_blog"
subtitle: ""
description: "hexo blog"
keywords:
author: xiaofen
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://xfcnl.github.io
permalink: :category/:title/
permalink_defaults:
  category: tech
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tag
archive_dir: archive
category_dir: ""
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :year-:month-:day-:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

# Home page setting
index_generator:
  path: ""
  per_page: 0
  order_by: -date

# Category & Tag
default_category: tech
category_map:
  tech: tech
  note: note
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: "mtime"

# Pagination
per_page: 0
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: xf

# Deployment
deploy:
  type: ""

# Feed
feed:
  type: atom
  path: feed.xml
  limit: 30

# Sitemap
sitemap:
  path: sitemap.xml

# Netease Music Player
netease_player:
  enable: true
  playlist_id: "8285330087"
  fixed: true
  mini: true
  theme: "#e74c3e"
  volume: 0.5
  order: "list"
