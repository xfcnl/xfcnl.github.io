<section class="link-section">
  <h2>交换友链</h2>
  <p>如果你想与本博客交换友链，请在下方填写你的博客信息，我会尽快添加</p>
  <p><strong>请确保你也添加了本博客的链接后再申请</strong></p>

  <form class="link-form">
    <div class="form-group">
      <label for="link-name">博客名称</label>
      <input
        type="text"
        id="link-name"
        name="name"
        required
        placeholder="你的博客名称"
      />
    </div>
    <div class="form-group">
      <label for="link-url">博客地址</label>
      <input
        type="url"
        id="link-url"
        name="url"
        required
        placeholder="https://example.com"
      />
    </div>
    <div class="form-group">
      <label for="link-avatar">头像链接</label>
      <input
        type="url"
        id="link-avatar"
        name="avatar"
        required
        placeholder="https://example.com/avatar.jpg"
      />
    </div>
    <div class="form-group">
      <label for="link-desc">博客描述</label>
      <input
        type="text"
        id="link-desc"
        name="desc"
        required
        placeholder="一句话介绍你的博客"
      />
    </div>
    <button type="submit">生成友链代码</button>
  </form>

  <div id="link-result"></div>
</section>

<script src="/assets/js/link.js"></script>
